<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>公众号排版器</title>

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="alternate icon" href="favicon.svg">
  <link rel="mask-icon" href="favicon.svg" color="#000000">

  <!-- Markdown 渲染库 -->
  <script src="https://cdn.jsdelivr.net/npm/markdown-it@14.0.0/dist/markdown-it.min.js"></script>

  <!-- 代码高亮库 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/atom-one-dark.min.css">
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/es/highlight.min.js"></script>

  <!-- Turndown - HTML 转 Markdown 库 -->
  <script src="https://cdn.jsdelivr.net/npm/turndown@7.2.0/dist/turndown.js"></script>

  <!-- Vue.js -->
  <script src="https://cdn.jsdelivr.net/npm/vue@3.4.15/dist/vue.global.prod.js"></script>

  <!-- html2canvas - 用于生成小红书图片 -->
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

  <style>
    /* ============================================================
       Dell 1996 inspired design system
       - Black page frame around viewport
       - Flat color blocks, no soft shadows
       - Arial Black / Helvetica / Times New Roman
       - 0px border radius everywhere
       - 1px solid black hairline borders
       ============================================================ */

    :root {
      /* Brand & Accent */
      --dell-red: #e91d2a;
      --dell-yellow: #fcc20f;
      --dell-purple: #6a26a4;
      --dell-link: #0000ee;

      /* Surface */
      --dell-frame: #000000;
      --dell-canvas: #ffffff;
      --dell-ink: #000000;

      /* Ribbon tints (for cycling through sidebar items) */
      --tint-olive: #8e8a25;
      --tint-sage: #b3bd95;
      --tint-salmon: #d77a7a;
      --tint-peach: #e6915d;
      --tint-lime: #c0d4a7;
      --tint-sky: #9ab6c8;
      --tint-steel: #a5b8c0;
      --tint-periwinkle: #8c9ae0;

      /* Legacy variable compatibility */
      --color-primary: #000000;
      --color-secondary: #444444;
      --color-tertiary: #666666;
      --color-accent: #000000;
      --color-bg: #ffffff;
      --color-surface: #ffffff;
      --color-border: #000000;
      --color-light-border: #000000;

      /* Spacing (Dell base = 4px) */
      --space-unit: 4px;
      --space-xs: 4px;
      --space-sm: 8px;
      --space-md: 12px;
      --space-lg: 16px;
      --space-xl: 20px;

      /* Typography */
      --font-display: "Arial Black", Helvetica, system-ui, sans-serif;
      --font-ui: Helvetica, Arial, system-ui, sans-serif;
      --font-body: "Times New Roman", Times, Georgia, serif;
      --font-mono: "SF Mono", Monaco, "Cascadia Code", Consolas, monospace;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      background: var(--dell-frame); /* black outside the frame */
    }

    body {
      font-family: var(--font-body);
      font-size: 14px;
      line-height: 1.4;
      color: var(--dell-ink);
      -webkit-font-smoothing: auto; /* period-accurate: no antialiasing tweak */
    }

    /* ============================================================
       Page Frame — the signature 8px black border around viewport
       ============================================================ */
    #app {
      display: grid;
      grid-template-columns: 180px 1fr 1fr;
      grid-template-rows: auto 1fr;
      height: calc(100vh - 16px); /* minus frame top+bottom */
      margin: 8px; /* the page frame */
      background: var(--dell-canvas);
      border: 1px solid var(--dell-frame);
    }

    /* ============================================================
       Top Banner (header)
       ============================================================ */
    .header {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: var(--dell-frame);
      color: var(--dell-canvas);
      border-bottom: 1px solid var(--dell-frame);
    }

    .logo {
      font-family: var(--font-ui);
      font-size: 16px;
      font-weight: 700;
      color: var(--dell-canvas);
      letter-spacing: 0.02em;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* Decorative "NEW!" sticker next to logo */
    .logo::after {
      content: "NEW!";
      background: var(--dell-yellow);
      color: var(--dell-ink);
      font-family: var(--font-ui);
      font-size: 10px;
      font-weight: 700;
      padding: 2px 6px;
      border: 1px solid var(--dell-frame);
      transform: rotate(-4deg);
      display: inline-block;
      letter-spacing: 0.05em;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header-links {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header-link {
      font-family: var(--font-body);
      font-size: 14px;
      color: var(--dell-canvas);
      text-decoration: underline;
      padding: 4px 8px;
      border: 1px solid transparent;
    }

    .header-link:hover {
      background: var(--dell-canvas);
      color: var(--dell-ink);
    }

    .header-link.primary {
      background: var(--dell-red);
      color: var(--dell-canvas);
      border-color: var(--dell-canvas);
      text-decoration: none;
      font-family: var(--font-ui);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
    }

    /* ============================================================
       Sidebar — ribbon card stack
       ============================================================ */
    .sidebar {
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--dell-frame);
      background: var(--dell-canvas);
      overflow: hidden;
      min-height: 0;
    }

    .sidebar-section {
      padding: 12px 12px;
      border-bottom: 1px solid var(--dell-frame);
      flex-shrink: 0;
    }

    .sidebar-section:first-child {
      padding: 0 12px;
      height: 56px;
      display: flex;
      align-items: center;
    }

    /* Upload button — button-secondary */
    .upload-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: 100%;
      padding: 6px 12px;
      border: 1px solid var(--dell-frame);
      background: var(--dell-canvas);
      color: var(--dell-ink);
      font-family: var(--font-ui);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      cursor: pointer;
      border-radius: 0;
    }

    .upload-btn:hover {
      background: var(--dell-frame);
      color: var(--dell-canvas);
    }

    .sidebar-styles {
      flex: 1;
      overflow-y: auto;
      padding: 10px 12px;
      border-bottom: none;
    }

    .sidebar-styles::-webkit-scrollbar {
      width: 8px;
    }

    .sidebar-styles::-webkit-scrollbar-track {
      background: var(--dell-canvas);
      border-left: 1px solid var(--dell-frame);
    }

    .sidebar-styles::-webkit-scrollbar-thumb {
      background: var(--dell-frame);
    }

    /* "样式" section label — ui-label style */
    .sidebar-label {
      font-family: var(--font-ui);
      font-size: 11px;
      font-weight: 700;
      color: var(--dell-ink);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
      padding-bottom: 4px;
      border-bottom: 1px solid var(--dell-frame);
    }

    .sidebar-group-title {
      font-family: var(--font-ui);
      font-size: 10px;
      font-weight: 700;
      color: var(--dell-ink);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin: 6px 0 4px 0;
    }

    .sidebar-divider {
      height: 1px;
      background: var(--dell-frame);
      margin: 6px 0;
    }

    /* Style item — ribbon-card inspired: white tile, black hairline border */
    .style-item {
      display: flex;
      align-items: center;
      padding: 6px 8px;
      border: 1px solid var(--dell-frame);
      background: var(--dell-canvas);
      cursor: pointer;
      font-family: var(--font-body);
      font-size: 13px;
      line-height: 1.3;
      color: var(--dell-ink);
      margin-bottom: 4px;
      border-radius: 0;
      transition: background 80ms, color 80ms;
    }

    .style-item:hover {
      background: var(--dell-yellow);
    }

    .style-item.active {
      background: var(--dell-frame);
      color: var(--dell-canvas);
      font-weight: 700;
    }

    .style-item.recommended::before {
      content: "★";
      color: var(--dell-red);
      font-size: 12px;
      margin-right: 6px;
      flex-shrink: 0;
    }

    .style-item.active.recommended::before {
      color: var(--dell-yellow);
    }

    .style-item.starred::after {
      content: "●";
      color: var(--dell-yellow);
      font-size: 10px;
      margin-left: auto;
      padding-left: 6px;
      flex-shrink: 0;
      text-shadow: 0 0 0 var(--dell-frame);
    }

    .style-item.active.starred::after {
      color: var(--dell-yellow);
    }

    .style-item-name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ============================================================
       Main content
       ============================================================ */
    .main-content {
      display: contents;
    }

    /* ============================================================
       Editor panel — text-input aesthetic
       ============================================================ */
    .editor-panel {
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--dell-frame);
      overflow: hidden;
      background: var(--dell-canvas);
    }

    .markdown-input-container {
      flex: 1;
      overflow: hidden;
      padding: 12px;
      background: var(--dell-canvas);
    }

    .markdown-input {
      width: 100%;
      height: 100%;
      padding: 12px;
      border: 1px solid var(--dell-frame);
      border-radius: 0;
      font-family: var(--font-mono);
      font-size: 13px;
      line-height: 1.5;
      resize: none;
      background: var(--dell-canvas);
      color: var(--dell-ink);
      outline: none;
    }

    .markdown-input:focus {
      outline: 2px solid var(--dell-frame);
      outline-offset: -2px;
    }

    .markdown-input.drag-over {
      background: var(--dell-yellow);
      border-color: var(--dell-frame);
    }

    .markdown-input::placeholder {
      color: var(--dell-ink);
      opacity: 0.5;
      font-family: var(--font-body);
      font-style: italic;
    }

    /* Editor header — char count (aligned with sidebar upload row & preview header) */
    .editor-header {
      padding: 0 12px;
      height: 56px;
      border-bottom: 1px solid var(--dell-frame);
      background: var(--dell-canvas);
      display: flex;
      align-items: center;
      justify-content: flex-end;
      flex-shrink: 0;
    }

    .char-count {
      font-family: var(--font-body);
      font-size: 11px;
      color: var(--dell-ink);
    }

    /* ============================================================
       Preview panel — ribbon-card body aesthetic
       ============================================================ */
    .preview-panel {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--dell-canvas);
    }

    .preview-header {
      padding: 0 16px;
      height: 56px;
      border-bottom: 1px solid var(--dell-frame);
      background: var(--dell-canvas);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      flex-shrink: 0;
    }

    .preview-title {
      font-family: var(--font-ui);
      font-size: 14px;
      font-weight: 700;
      color: var(--dell-ink);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .preview-actions {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .preview-container {
      padding: 24px 28px;
      background: var(--dell-canvas);
    }

    .preview-content {
      flex: 1;
      overflow-y: auto;
      max-width: 740px;
      margin: 0 auto;
      width: 100%;
    }

    /* ============================================================
       Buttons — primary (black) / secondary (white) / CTA (red)
       ============================================================ */

    /* Copy button — cta-block-red (the main CTA) */
    .copy-btn {
      background: var(--dell-red);
      color: var(--dell-canvas);
      border: 1px solid var(--dell-frame);
      font-family: var(--font-ui);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 6px 14px;
      cursor: pointer;
      border-radius: 0;
      transition: background 80ms;
    }

    .copy-btn:hover {
      background: #b8141f;
    }

    .copy-btn:active {
      background: var(--dell-frame);
    }

    /* Star button */
    .star-btn {
      background: var(--dell-canvas);
      color: var(--dell-ink);
      border: 1px solid var(--dell-frame);
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border-radius: 0;
      padding: 0;
    }

    .star-btn:hover {
      background: var(--dell-yellow);
    }

    .star-btn.active {
      background: var(--dell-yellow);
    }

    .star-btn svg {
      width: 14px;
      height: 14px;
    }

    /* History & save buttons — button-secondary */
    .history-btn,
    .save-btn {
      background: var(--dell-canvas);
      color: var(--dell-ink);
      border: 1px solid var(--dell-frame);
      font-family: var(--font-ui);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 6px 10px;
      cursor: pointer;
      border-radius: 0;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .history-btn:hover,
    .save-btn:hover {
      background: var(--dell-frame);
      color: var(--dell-canvas);
    }

    .history-btn svg,
    .save-btn svg {
      width: 12px;
      height: 12px;
    }

    .history-count {
      font-family: var(--font-ui);
      font-size: 10px;
      font-weight: 700;
      background: var(--dell-frame);
      color: var(--dell-canvas);
      padding: 1px 5px;
      border-radius: 0;
      margin-left: 2px;
    }

    /* ============================================================
       Mode switcher (wechat / xiaohongshu toggle)
       ============================================================ */
    .mode-switcher {
      display: flex;
      border: 1px solid var(--dell-frame);
      background: var(--dell-canvas);
    }

    .mode-toggle-btn {
      background: var(--dell-canvas);
      color: var(--dell-ink);
      border: none;
      border-right: 1px solid var(--dell-frame);
      font-family: var(--font-ui);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      padding: 5px 10px;
      cursor: pointer;
      border-radius: 0;
    }

    .mode-toggle-btn:last-child {
      border-right: none;
    }

    .mode-toggle-btn.active {
      background: var(--dell-frame);
      color: var(--dell-canvas);
    }

    /* Xiaohongshu export button */
    .xiaohongshu-btn {
      background: var(--dell-canvas);
      color: var(--dell-ink);
      border: 1px solid var(--dell-frame);
      font-family: var(--font-ui);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      padding: 5px 10px;
      cursor: pointer;
      border-radius: 0;
    }

    .xiaohongshu-btn:hover {
      background: var(--dell-yellow);
    }

    /* ============================================================
       GIF switch — toggle track/thumb
       ============================================================ */
    .gif-switch {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: var(--font-ui);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--dell-ink);
      cursor: pointer;
    }

    .gif-switch__track {
      width: 28px;
      height: 14px;
      background: var(--dell-canvas);
      border: 1px solid var(--dell-frame);
      border-radius: 0;
      position: relative;
      transition: background 80ms;
    }

    .gif-switch__thumb {
      position: absolute;
      top: 1px;
      left: 1px;
      width: 10px;
      height: 10px;
      background: var(--dell-frame);
      transition: left 80ms;
    }

    .gif-switch__input {
      display: none;
    }

    .gif-switch__input:checked + .gif-switch__track {
      background: var(--dell-red);
    }

    .gif-switch__input:checked + .gif-switch__track .gif-switch__thumb {
      left: 15px;
      background: var(--dell-canvas);
    }

    /* ============================================================
       History sidebar
       ============================================================ */
    .history-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 100;
      display: none;
    }

    .history-overlay.visible {
      display: block;
    }

    .history-sidebar {
      position: fixed;
      top: 0;
      right: 0;
      width: 360px;
      height: 100vh;
      background: var(--dell-canvas);
      border-left: 2px solid var(--dell-frame);
      z-index: 101;
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform 200ms;
    }

    .history-sidebar.open {
      transform: translateX(0);
    }

    .history-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--dell-frame);
      background: var(--dell-frame);
      color: var(--dell-canvas);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .history-header-left {
      font-family: var(--font-ui);
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .history-header-left .history-count {
      background: var(--dell-red);
      color: var(--dell-canvas);
    }

    .history-close-btn {
      background: transparent;
      color: var(--dell-canvas);
      border: 1px solid var(--dell-canvas);
      width: 24px;
      height: 24px;
      cursor: pointer;
      border-radius: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-ui);
      font-weight: 700;
    }

    .history-close-btn:hover {
      background: var(--dell-canvas);
      color: var(--dell-ink);
    }

    .history-actions {
      padding: 10px 16px;
      border-bottom: 1px solid var(--dell-frame);
      display: flex;
      gap: 8px;
    }

    .history-list {
      flex: 1;
      overflow-y: auto;
      padding: 0;
    }

    .history-item {
      padding: 10px 16px;
      border-bottom: 1px solid var(--dell-frame);
      cursor: pointer;
      background: var(--dell-canvas);
    }

    .history-item:hover {
      background: var(--dell-yellow);
    }

    .history-item.active {
      background: var(--dell-frame);
      color: var(--dell-canvas);
    }

    .history-title {
      font-family: var(--font-ui);
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .history-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: var(--font-body);
      font-size: 11px;
      opacity: 0.8;
    }

    .history-time {
      font-family: var(--font-body);
      font-size: 11px;
    }

    .history-style {
      font-family: var(--font-ui);
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      padding: 1px 5px;
      border: 1px solid currentColor;
    }

    .history-item-content {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .history-empty {
      padding: 40px 20px;
      text-align: center;
      font-family: var(--font-body);
      font-style: italic;
      color: var(--dell-ink);
      opacity: 0.6;
    }

    /* ============================================================
       Empty state (preview placeholder)
       ============================================================ */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      text-align: center;
      color: var(--dell-ink);
    }

    .empty-state-icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.3;
    }

    .empty-state h3 {
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 900;
      margin-bottom: 8px;
      text-transform: uppercase;
    }

    .empty-state p {
      font-family: var(--font-body);
      font-size: 14px;
      opacity: 0.7;
      max-width: 300px;
    }

    /* ============================================================
       Toast notifications
       ============================================================ */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--dell-frame);
      color: var(--dell-canvas);
      padding: 10px 20px;
      border: 1px solid var(--dell-frame);
      font-family: var(--font-ui);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      z-index: 1000;
      border-radius: 0;
      box-shadow: 4px 4px 0 var(--dell-red);
    }

    .toast.success {
      box-shadow: 4px 4px 0 var(--dell-frame);
    }

    .toast.error {
      box-shadow: 4px 4px 0 var(--dell-red);
    }

    /* ============================================================
       Xiaohongshu mode
       ============================================================ */
    .xiaohongshu-preview {
      padding: 16px;
      overflow-y: auto;
      flex: 1;
    }

    .xiaohongshu-controls {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--dell-frame);
      flex-wrap: wrap;
      align-items: center;
    }

    .xiaohongshu-images-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;

    .xiaohongshu-image-card {
      border: 1px solid var(--dell-frame);
      background: var(--dell-canvas);
      padding: 8px;
    }

    .xiaohongshu-image-card img {
      width: 100%;
      display: block;
      border: 1px solid var(--dell-frame);
    }

    .xiaohongshu-image-label {
      font-family: var(--font-ui);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      margin-top: 6px;
      text-align: center;
    }

    .xiaohongshu-loading {
      padding: 40px;
      text-align: center;
      font-family: var(--font-body);
      font-style: italic;
    }

    .xiaohongshu-empty {
      padding: 40px;
      text-align: center;
      font-family: var(--font-body);
      font-style: italic;
      opacity: 0.6;
    }

    /* ============================================================
       Floating ad (restyled to fit Dell 1996 aesthetic)
       ============================================================ */
    .floating-ad {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 280px;
      background: var(--dell-canvas);
      border: 2px solid var(--dell-frame);
      z-index: 99;
      font-family: var(--font-body);
      box-shadow: 4px 4px 0 var(--dell-frame);
    }

    .floating-ad__header {
      background: var(--dell-frame);
      color: var(--dell-canvas);
      padding: 6px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-family: var(--font-ui);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .floating-ad__title {
      font-family: var(--font-ui);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .floating-ad__close {
      background: transparent;
      border: 1px solid var(--dell-canvas);
      color: var(--dell-canvas);
      width: 18px;
      height: 18px;
      cursor: pointer;
      border-radius: 0;
      font-family: var(--font-ui);
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      line-height: 1;
    }

    .floating-ad__close:hover {
      background: var(--dell-canvas);
      color: var(--dell-ink);
    }

    .floating-ad__list {
      padding: 0;
    }

    .floating-ad__item {
      padding: 10px;
      border-bottom: 1px solid var(--dell-frame);
      cursor: pointer;
      display: flex;
      gap: 8px;
      align-items: flex-start;
    }

    .floating-ad__item:last-child {
      border-bottom: none;
    }

    .floating-ad__item:hover {
      background: var(--dell-yellow);
    }

    .floating-ad__item.active {
      background: var(--dell-frame);
      color: var(--dell-canvas);
    }

    .floating-ad__icon {
      font-size: 20px;
      flex-shrink: 0;
    }

    .floating-ad__info {
      flex: 1;
      min-width: 0;
    }

    .floating-ad__item .floating-ad__title {
      font-family: var(--font-ui);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      margin-bottom: 2px;
    }

    .floating-ad__subtitle {
      font-family: var(--font-body);
      font-size: 12px;
      line-height: 1.3;
    }

    .floating-ad__tag {
      display: inline-block;
      font-family: var(--font-ui);
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      padding: 1px 5px;
      border: 1px solid currentColor;
      margin-top: 4px;
    }

    .floating-ad__tag--orange { color: var(--dell-red); }
    .floating-ad__tag--blue { color: var(--dell-link); }
    .floating-ad__tag--green { color: #008800; }

    .floating-ad__coupon {
      font-family: var(--font-mono);
      font-size: 11px;
      background: var(--dell-yellow);
      color: var(--dell-ink);
      padding: 1px 4px;
      border: 1px solid var(--dell-frame);
      margin-top: 4px;
      display: inline-block;
    }

    .floating-ad__indicators {
      display: flex;
      gap: 4px;
      padding: 6px 10px;
      border-top: 1px solid var(--dell-frame);
      background: var(--dell-canvas);
    }

    .floating-ad__indicator {
      width: 8px;
      height: 8px;
      border: 1px solid var(--dell-frame);
      background: var(--dell-canvas);
      cursor: pointer;
    }

    .floating-ad__indicator.active {
      background: var(--dell-frame);
    }

    /* Collapsed state */
    .floating-ad__collapsed {
      background: var(--dell-yellow);
      border: 2px solid var(--dell-frame);
      padding: 6px 10px;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      box-shadow: 4px 4px 0 var(--dell-frame);
    }

    .floating-ad__collapsed-icon {
      font-size: 18px;
    }

    .floating-ad__collapsed-title {
      font-family: var(--font-ui);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      flex: 1;
    }

    .floating-ad__collapsed-tag {
      font-family: var(--font-ui);
      font-size: 10px;
      font-weight: 700;
      background: var(--dell-frame);
      color: var(--dell-canvas);
      padding: 1px 4px;
    }

    .floating-ad__collapse {
      background: transparent;
      border: none;
      cursor: pointer;
      font-size: 14px;
      color: var(--dell-ink);
      padding: 0 2px;
      font-weight: 700;
    }

    .floating-ad__close-expanded {
      background: transparent;
      border: 1px solid var(--dell-frame);
      width: 16px;
      height: 16px;
      cursor: pointer;
      border-radius: 0;
      font-weight: 700;
      font-size: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .floating-ad__arrow {
      display: none;
    }

    .floating-ad__panel {
      display: none;
    }

    .floating-ad__panel-header {
      display: none;
    }

    .floating-ad__panel-title {
      display: none;
    }

    /* ============================================================
       Responsive
       ============================================================ */
    @media (max-width: 768px) {
      #app {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto auto 1fr;
        height: auto;
        min-height: 100vh;
        margin: 4px;
      }

      .header {
        flex-wrap: wrap;
        gap: 6px;
        padding: 8px 12px;
      }

      .logo {
        font-size: 14px;
      }

      /* Sidebar becomes horizontal strip */
      .sidebar {
        flex-direction: row;
        align-items: center;
        overflow-x: auto;
        overflow-y: hidden;
        border-right: none;
        border-bottom: 1px solid var(--dell-frame);
        padding: 6px 8px;
        gap: 6px;
      }

      .sidebar-section {
        flex-shrink: 0;
        border-bottom: none;
        padding: 0;
      }

      .upload-btn {
        width: auto;
        padding: 4px 8px;
      }

      .sidebar-styles {
        display: flex;
        flex-wrap: nowrap;
        overflow: visible;
        padding: 0;
        gap: 4px;
        flex: 1;
      }

      .sidebar-label,
      .sidebar-group-title {
        display: none;
      }

      .sidebar-divider {
        width: 1px;
        height: 16px;
        margin: 0 2px;
      }

      .style-item {
        white-space: nowrap;
        padding: 4px 8px;
        margin-bottom: 0;
        font-size: 11px;
      }

      .editor-panel {
        border-right: none;
        border-bottom: 1px solid var(--dell-frame);
        max-height: 30vh;
      }

      .markdown-input-container {
        padding: 8px;
      }

      .markdown-input {
        font-size: 13px;
        padding: 8px;
      }

      .preview-header {
        padding: 6px 10px;
        flex-wrap: wrap;
      }

      .preview-container {
        padding: 16px 12px;
      }

      .copy-btn {
        padding: 5px 10px;
        font-size: 11px;
      }

      .history-btn-text,
      .save-btn-text {
        display: none;
      }

      .history-sidebar {
        width: 100%;
        right: -100%;
      }

      .toast {
        left: 16px;
        right: 16px;
        bottom: 16px;
        transform: none;
      }

      .floating-ad,
      .floating-ad__collapsed {
        left: 12px;
        right: 12px;
        bottom: 12px;
        width: auto;
      }
    }

    @media (min-width: 769px) and (max-width: 1024px) {
      #app {
        margin: 6px;
      }

      .preview-container {
        padding: 20px 16px;
      }
    }

  </style>
</head>

💡 提示：可以直接粘贴截图，或拖拽图片文件到这里"
            spellcheck="false"

          <span class="floating-ad__panel-title">🔥 热门推荐</span>
          <button class="floating-ad__collapse" @click="toggleFloatingAd" aria-label="收起">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M19 9l-7 7-7-7"/>
            </svg>
          </button>
        </div>

        <div class="floating-ad__list">
          <div
            v-for="ad in floatingAd.ads"
            :key="ad.id"
            class="floating-ad__item"
            @click="openFloatingAd(ad)"
          >
            <span class="floating-ad__icon">{{ ad.icon }}</span>
            <div class="floating-ad__info">
              <div class="floating-ad__header">
                <span class="floating-ad__title">{{ ad.title }}</span>
                <span class="floating-ad__tag" :class="`floating-ad__tag--${ad.tagColor}`">
                  {{ ad.tag }}
                </span>
              </div>
              <span class="floating-ad__subtitle">{{ ad.subtitle }}</span>
              <span v-if="ad.coupon" class="floating-ad__coupon">优惠码: {{ ad.coupon }}</span>
            </div>
            <svg class="floating-ad__arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9 18l6-6-6-6"/>
            </svg>
          </div>
        </div>

        <button class="floating-ad__close-expanded" @click="closeFloatingAd">
          暂时不需要
        </button>
      </div>

      轮播指示器
      <div v-if="!floatingAd.isExpanded" class="floating-ad__indicators">
        <span
          v-for="(ad, idx) in floatingAd.ads"
          :key="ad.id"
          class="floating-ad__indicator"
          :class="{ active: idx === floatingAd.currentIndex }"
          @click.stop="setFloatingAdIndex(idx)"
        ></span>
      </div>
    </div>
    AD-DISABLED-END -->

    <!-- Toast 提示 -->
    <div v-if="toast.show" class="toast" :class="toast.type">
      {{ toast.message }}
    </div>
  </div>

  <!-- 加载脚本 -->
  <script src="styles.js?v=4"></script>
  <script src="app.js?v=5"></script>
</body>
</html>
